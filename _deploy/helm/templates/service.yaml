apiVersion: v1
kind: Service
metadata:
  name: {{ include "postgres-cdc.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "postgres-cdc.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "postgres-cdc.selectorLabels" . | nindent 4 }}
  ports:
    - name: health
      port: {{ .Values.service.healthPort }}
      targetPort: health
      protocol: TCP
    - name: metrics
      port: {{ .Values.service.metricsPort }}
      targetPort: metrics
      protocol: TCP
