postgres:
  host: localhost
  port: 5433
  user: cdc
  password: changeme
  dbname: app

replication:
  slot_name: cdc_slot
  publication_name: cdc_pub
  create_slot_if_missing: true
  status_interval: 10s
  # heartbeat_interval: emit heartbeat records at this interval (0 = disabled).
  # Heartbeats go to {topic.prefix}.__heartbeat so downstream consumers can
  # detect liveness and WAL lag even when publication tables are quiet.
  heartbeat_interval: 0s

snapshot:
  mode: never
  fetch_size: 10000
  tables: []

redpanda:
  brokers:
    - localhost:29092
  compression: snappy
  linger: 5ms
  max_inflight: 5
  required_acks: all
  # topic_auto_create: create topics via the Kafka Admin API before first publish.
  # Set partitions > 0 to enable. Topics already existing are left untouched.
  topic_auto_create:
    partitions: 3
    replication_factor: 1

topic:
  mode: per_table
  prefix: cdc
  # single_topic_name: cdc-all  # only used when mode=single

checkpoint:
  backend: file
  file_path: /var/lib/cdc/checkpoint.json
  flush_interval: 5s

runtime:
  queue_capacity: 4096
  max_tx_bytes: 67108864    # 64 MiB
  shutdown_timeout: 30s
  # checkpoint_limit: max in-flight transaction batches. LSN only advances when
  # all prior batches are acked (contiguous window). Set to 1 for sequential (default).
  checkpoint_limit: 1

logging:
  level: info

metrics:
  enabled: true
  listen_addr: ":9090"
  path: /metrics
  namespace: cdc
  subsystem: ""

health:
  listen_addr: ":8080"

tuning:
  producer_batch_max_bytes: 1048576    # 1 MiB
  producer_batch_max_records: 1000
