name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    name: Lint · Test · Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install gofumpt
        run: go install mvdan.cc/gofumpt@latest

      - name: Verify tidy & format
        run: |
          go mod tidy
          gofumpt -w .
          git diff --exit-code

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest

      - name: Lint
        run: golangci-lint run --timeout=5m

      - name: Test
        run: go test -race -count=1 ./...

      - name: Build
        run: go build -ldflags="-s -w" -o /dev/null ./cmd/cdc

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: ci

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: cdc
          POSTGRES_PASSWORD: changeme
          POSTGRES_DB: app
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U cdc -d app"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      kafka:
        image: bitnamilegacy/kafka
        ports:
          - 19092:19092
        options: >-
          --health-cmd "kafka-broker-api-versions.sh --version"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        env:
          KAFKA_ENABLE_KRAFT: "yes"
          KAFKA_CFG_NODE_ID: "1"
          KAFKA_CFG_PROCESS_ROLES: broker,controller
          KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
          KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:19092
          KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
          KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:19092
          KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@:9093
          ALLOW_PLAINTEXT_LISTENER: "yes"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Configure PostgreSQL for logical replication
        run: |
          PGPASSWORD=changeme psql -h localhost -p 5433 -U cdc -d app -c "ALTER SYSTEM SET wal_level = 'logical';"
          PGPASSWORD=changeme psql -h localhost -p 5433 -U cdc -d app -c "ALTER SYSTEM SET max_replication_slots = 4;"
          PGPASSWORD=changeme psql -h localhost -p 5433 -U cdc -d app -c "ALTER SYSTEM SET max_wal_senders = 4;"
          # Restart postgres to apply wal_level change (find container by published port)
          PG_CONTAINER=$(docker ps --filter "publish=5433" -q)
          docker restart "$PG_CONTAINER"
          # Wait for postgres to be ready
          for i in $(seq 1 30); do PGPASSWORD=changeme pg_isready -h localhost -p 5433 -U cdc -d app && break || sleep 1; done

      - name: Integration tests
        env:
          TEST_PG_DSN: "host=localhost port=5433 user=cdc password=changeme dbname=app sslmode=disable"
          TEST_BROKER: "localhost:19092"
        run: go test -race -tags=integration -count=1 -v -timeout=300s ./internal/

  publish:
    name: Build & Push Docker image
    runs-on: ubuntu-latest
    needs: [ci, integration]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PAT }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: kperreau/postgres-cdc
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
